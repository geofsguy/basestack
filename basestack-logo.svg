<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BaseStack logo</title>
  <desc id="desc">BaseStack wordmark with the stacked three-bar icon used in the app.</desc>
  <defs>
    <linearGradient id="iconGradient" x1="80" y1="48" x2="240" y2="272" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="390" y1="84" x2="990" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#312E81" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="40" y="40" width="240" height="240" rx="56" fill="#F8FAFC"/>
    <rect x="88" y="184" width="144" height="48" rx="12" fill="url(#iconGradient)"/>
    <rect x="112" y="124" width="96" height="48" rx="12" fill="url(#iconGradient)"/>
    <rect x="136" y="64" width="48" height="48" rx="12" fill="url(#iconGradient)"/>
  </g>

  <text
    x="390"
    y="208"
    fill="url(#accentGradient)"
    font-family="Inter, Avenir Next, Segoe UI, Arial, sans-serif"
    font-size="144"
    font-weight="800"
    letter-spacing="-6"
  >BaseStack</text>
</svg>
